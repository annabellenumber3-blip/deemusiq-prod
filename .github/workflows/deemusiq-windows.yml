name: Build DeeMusiq (Windows)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.2"
  FLUTTER_CHANNEL: "master"

defaults:
  run:
    working-directory: deemusiq-app

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git
      - name: Install dependencies
        run: flutter pub get
      - name: Create .env
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          cat > .env <<EOF
          LASTFM_API_KEY=${LASTFM_API_KEY}
          LASTFM_API_SECRET=${LASTFM_API_SECRET}
          ENABLE_UPDATE_CHECK=1
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test

  windows:
    needs: check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env
        shell: pwsh
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          @"
          LASTFM_API_KEY=$env:LASTFM_API_KEY
          LASTFM_API_SECRET=$env:LASTFM_API_SECRET
          ENABLE_UPDATE_CHECK=1
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          "@ | Out-File -Encoding ascii .env

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        env:
          DEEMUSIQ_BACKEND_URL: ${{ vars.DEEMUSIQ_BACKEND_URL }}
          DEEMUSIQ_CHANNEL_KEY: ${{ secrets.DEEMUSIQ_CHANNEL_KEY }}
        run: |
          flutter build windows --release `
            --dart-define=DEEMUSIQ_BACKEND_URL="$env:DEEMUSIQ_BACKEND_URL" `
            --dart-define=DEEMUSIQ_CHANNEL_KEY="$env:DEEMUSIQ_CHANNEL_KEY"

      - name: Package Windows installer (NSIS)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $buildDir = "build/windows/x64/runner/Release"
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:').Line -replace 'version:\s*', ''

          # Create NSIS installer script
          $nsis = @"
          !include "MUI2.nsh"
          Name "DeeMusiq"
          OutFile "dist\DeeMusiq-windows-x86_64-setup.exe"
          InstallDir `"`$PROGRAMFILES64\DeeMusiq`"
          RequestExecutionLevel admin
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"
          Section "Install"
            SetOutPath `$INSTDIR
            File /r "$buildDir\*"
            CreateShortCut "`$DESKTOP\DeeMusiq.lnk" "`$INSTDIR\deemusiq.exe"
            CreateDirectory "`$SMPROGRAMS\DeeMusiq"
            CreateShortCut "`$SMPROGRAMS\DeeMusiq\DeeMusiq.lnk" "`$INSTDIR\deemusiq.exe"
            CreateShortCut "`$SMPROGRAMS\DeeMusiq\Uninstall.lnk" "`$INSTDIR\uninst.exe"
            WriteUninstaller "`$INSTDIR\uninst.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\DeeMusiq" "DisplayName" "DeeMusiq"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\DeeMusiq" "UninstallString" "`$INSTDIR\uninst.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\DeeMusiq" "DisplayVersion" "$version"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\DeeMusiq" "Publisher" "The Dembe Group"
          SectionEnd
          Section "Uninstall"
            Delete "`$INSTDIR\*.*"
            RMDir /r "`$INSTDIR"
            Delete "`$DESKTOP\DeeMusiq.lnk"
            RMDir /r "`$SMPROGRAMS\DeeMusiq"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\DeeMusiq"
          SectionEnd
          "@
          $nsis | Out-File -Encoding ascii dist/installer.nsi

          # Install NSIS
          choco install nsis -y --no-progress
          # Build the installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" dist/installer.nsi

          # Also create portable zip
          Compress-Archive -Path "$buildDir\*" -DestinationPath "dist/DeeMusiq-windows-x86_64-portable.zip"
          
          Get-ChildItem dist/

      - uses: actions/upload-artifact@v4
        with:
          name: DeeMusiq-windows
          path: |
            deemusiq-app/dist/DeeMusiq-windows-x86_64-setup.exe
            deemusiq-app/dist/DeeMusiq-windows-x86_64-portable.zip
          if-no-files-found: error

      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deemusiq-app/dist/DeeMusiq-windows-x86_64-setup.exe
            deemusiq-app/dist/DeeMusiq-windows-x86_64-portable.zip
          name: DeeMusiq ${{ github.ref_name }}
          body: |
            DeeMusiq — *It's a drop day.*

            **Windows:**
            - `.exe` installer — run `DeeMusiq-windows-x86_64-setup.exe`
            - `.zip` portable — extract and run `deemusiq.exe`
