name: Build DeeMusiq (macOS)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.2"
  FLUTTER_CHANNEL: "master"

defaults:
  run:
    working-directory: deemusiq-app

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git
      - name: Install dependencies
        run: flutter pub get
      - name: Create .env
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          cat > .env <<EOF
          LASTFM_API_KEY=${LASTFM_API_KEY}
          LASTFM_API_SECRET=${LASTFM_API_SECRET}
          ENABLE_UPDATE_CHECK=1
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test

  macos:
    needs: check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          cat > .env <<EOF
          LASTFM_API_KEY=${LASTFM_API_KEY}
          LASTFM_API_SECRET=${LASTFM_API_SECRET}
          ENABLE_UPDATE_CHECK=1
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release
        env:
          DEEMUSIQ_BACKEND_URL: ${{ vars.DEEMUSIQ_BACKEND_URL }}
          DEEMUSIQ_CHANNEL_KEY: ${{ secrets.DEEMUSIQ_CHANNEL_KEY }}
        run: |
          flutter build macos --release \
            --dart-define=DEEMUSIQ_BACKEND_URL="$DEEMUSIQ_BACKEND_URL" \
            --dart-define=DEEMUSIQ_CHANNEL_KEY="$DEEMUSIQ_CHANNEL_KEY"

      - name: Package macOS .dmg
        run: |
          mkdir -p dist
          APP_PATH="build/macos/Build/Products/Release/DeeMusiq.app"
          # Fallback: Flutter sometimes names it Runner.app
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="build/macos/Build/Products/Release/Runner.app"
          fi
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::No .app bundle found"
            find build/macos -name "*.app" -type d
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/.*: //')

          # Create a temporary DMG directory with a symlink to /Applications
          DMG_DIR="dist/dmg_staging"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"

          # Create .dmg using hdiutil (built into macOS)
          DMG_NAME="dist/DeeMusiq-macos-universal.dmg"
          hdiutil create -volname "DeeMusiq" -srcfolder "$DMG_DIR" \
            -ov -format UDZO "$DMG_NAME"
          
          # Also create a .zip for direct distribution
          cd "$DMG_DIR"
          zip -r "../../../dist/DeeMusiq-macos-universal.zip" "DeeMusiq.app" 2>/dev/null || \
          zip -r "../../../dist/DeeMusiq-macos-universal.zip" "Runner.app"
          cd ../../../

          rm -rf "$DMG_DIR"
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: DeeMusiq-macos
          path: |
            deemusiq-app/dist/DeeMusiq-macos-universal.dmg
            deemusiq-app/dist/DeeMusiq-macos-universal.zip
          if-no-files-found: error

      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deemusiq-app/dist/DeeMusiq-macos-universal.dmg
            deemusiq-app/dist/DeeMusiq-macos-universal.zip
          name: DeeMusiq ${{ github.ref_name }}
          body: |
            DeeMusiq — *It's a drop day.*

            **macOS:**
            - `.dmg` — open and drag `DeeMusiq.app` to Applications
            - `.zip` — extract and right-click → Open (Gatekeeper bypass)
