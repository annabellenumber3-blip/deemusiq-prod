name: Build DeeMusiq (Android APK)

# Builds the DeeMusiq Android APK from the deemusiq-app/ subfolder of this repo.
#  • Manual:  Actions tab → this workflow → Run workflow
#  • Release: push a tag like v1.0.0  →  APK is attached to a GitHub Release
#  • Quality gate: every branch push / PR runs the `check` job only
#    (analyze + test); the APK `android` job builds on tags & manual runs,
#    after `check` passes.
#
# NOTE — there are intentionally TWO copies of this workflow:
#  • THIS one (repo root .github/) builds from the monorepo, with
#    working-directory: deemusiq-app. GitHub only auto-discovers workflows under the
#    repo-root .github/, so ONLY this one runs in the monorepo (no double-build).
#  • deemusiq-app/.github/ holds a near-identical copy WITHOUT a working-directory,
#    for the documented "upload only the deemusiq-app/ folder to its own repo" path
#    (see deemusiq-app/README.DEEMUSIQ.md). They are NOT a conflict — keep both.
#
# Signing: a TEMPORARY keystore is auto-generated so the APK installs for testing.
# For public releases with working updates, add repo secrets KEYSTORE_BASE64,
# KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD (see deemusiq-app/README.DEEMUSIQ.md).

on:
  workflow_dispatch:
  push:
    branches: ["**"] # branch pushes run only `check` (see job-level if on android)
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.2"
  FLUTTER_CHANNEL: "master"

defaults:
  run:
    working-directory: deemusiq-app

jobs:
  # Quality gate — runs on every branch push, PR, tag push and manual run.
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env (required by envied code generation)
        # Same as the build job's .env step — see the comments there.
        # On PRs from forks the secrets are empty; the check still passes.
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          cat > .env <<EOF
          LASTFM_API_KEY=${LASTFM_API_KEY}
          LASTFM_API_SECRET=${LASTFM_API_SECRET}
          ENABLE_UPDATE_CHECK=1
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        # --no-fatal-infos: the tree has known info-level lints (e.g.
        # avoid_print in lib/services/cli/cli.dart). Warnings/errors stay fatal.
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

  android:
    needs: check
    # Build only for releases: v* tag pushes and manual runs. `check` runs
    # (and gates) on those same events; branch pushes / PRs skip this job.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          flutter pub get
          # Spotube's helper sets up any native platform deps; non-fatal if it no-ops.
          dart cli/cli.dart install-dependencies --platform=android --arch=all || true

      - name: Generate DeeMusiq icons & splash
        run: |
          dart run flutter_launcher_icons -f flutter_launcher_icons.yaml || dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Create .env (required by envied code generation)
        # env.dart is annotated @Envied(requireEnvFile: true, path: ".env"), so
        # build_runner aborts if .env is missing. The LastFM keys may be empty
        # (scrobbling just stays off); the build still succeeds. Set repo secrets
        # LASTFM_API_KEY / LASTFM_API_SECRET to enable Last.fm scrobbling.
        # Secrets are passed via env: (not interpolated into the script body).
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_API_SECRET: ${{ secrets.LASTFM_API_SECRET }}
        run: |
          cat > .env <<EOF
          LASTFM_API_KEY=${LASTFM_API_KEY}
          LASTFM_API_SECRET=${LASTFM_API_SECRET}
          ENABLE_UPDATE_CHECK=1
          RELEASE_CHANNEL=stable
          HIDE_DONATIONS=1
          EOF

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Set up signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using keystore from repository secret (production / update-safe)."
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/deemusiq.jks
            KS_PASS="$KEYSTORE_PASSWORD"; ALIAS="$KEY_ALIAS"; K_PASS="$KEY_PASSWORD"
          else
            echo "::warning::No KEYSTORE_BASE64 secret — generating a TEMPORARY keystore."
            echo "::warning::APK installs for testing, but set a permanent keystore secret before public release so future updates install over old versions."
            KS_PASS="deemusiq"; ALIAS="deemusiq"; K_PASS="deemusiq"
            keytool -genkeypair -v -keystore android/app/deemusiq.jks -keyalg RSA -keysize 2048 \
              -validity 10000 -alias "$ALIAS" -storepass "$KS_PASS" -keypass "$K_PASS" \
              -dname "CN=DeeMusiq, OU=DeeMusiq, O=The Dembe Group, L=KwaZulu-Natal, C=ZA"
          fi
          cat > android/key.properties <<EOF
          storePassword=$KS_PASS
          keyPassword=$K_PASS
          keyAlias=$ALIAS
          storeFile=deemusiq.jks
          EOF

      - name: Build release APK
        # Backend wiring is optional: when the repo var/secret are unset the
        # dart-defines are empty strings and the app keeps its offline default.
        # Passed via env: (not interpolated into the script body).
        env:
          DEEMUSIQ_BACKEND_URL: ${{ vars.DEEMUSIQ_BACKEND_URL }}
          DEEMUSIQ_CHANNEL_KEY: ${{ secrets.DEEMUSIQ_CHANNEL_KEY }}
        run: >
          flutter build apk --release --flavor stable
          --dart-define=DEEMUSIQ_BACKEND_URL="${DEEMUSIQ_BACKEND_URL}"
          --dart-define=DEEMUSIQ_CHANNEL_KEY="${DEEMUSIQ_CHANNEL_KEY}"

      - name: Collect APK
        run: |
          mkdir -p dist
          # Prefer the flavored release APK; fall back deterministically.
          src=$(find build -name "app-stable-release.apk" -print -quit)
          [ -z "$src" ] && src=$(find build -name "*-release.apk" -print -quit)
          [ -z "$src" ] && src=$(find build -name "*.apk" -print -quit)
          if [ -z "$src" ]; then echo "::error::No APK found under build/"; exit 1; fi
          echo "Found APK: $src"
          cp "$src" dist/DeeMusiq.apk
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: DeeMusiq-apk
          path: deemusiq-app/dist/DeeMusiq.apk
          if-no-files-found: error

      - name: Attach to GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: deemusiq-app/dist/DeeMusiq.apk
          name: DeeMusiq ${{ github.ref_name }}
          body: |
            DeeMusiq Android app — *It's a drop day.*

            **Install:** download `DeeMusiq.apk`, open it on your Android phone, and
            allow "install from unknown sources" when prompted.
